<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="880" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0e1a"/>
      <stop offset="100%" stop-color="#10132a"/>
    </linearGradient>
  </defs>

  <rect width="880" height="520" rx="14" fill="url(#bg)"/>

  <!-- Title -->
  <text x="28" y="36" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="11" fill="#6b7394" letter-spacing="4">HOW IT WORKS</text>

  <!-- Column headers -->
  <text x="160" y="62" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#4a5578" letter-spacing="2">YOUR AGENT</text>
  <text x="470" y="62" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#4a5578" letter-spacing="2">EXAMPLE</text>
  <text x="740" y="62" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#4a5578" letter-spacing="2">MEANWHILE</text>

  <!-- ═══ COLUMN 1: YOUR AGENT ═══ -->

  <!-- Connect phase -->
  <rect x="24" y="78" width="280" height="62" rx="8" fill="#141827" stroke="#252b45" stroke-width="1"/>
  <text x="38" y="98" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="12" font-weight="700" fill="#e2e8f0">Connect</text>
  <text x="38" y="114" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#6b7394">Get index, read relevant sections</text>
  <rect x="38" y="122" width="185" height="14" rx="3" fill="rgba(99,102,241,0.1)"/>
  <text x="44" y="133" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8" font-weight="600" fill="#818cf8">get_index() + read_section()</text>

  <!-- Arrow down -->
  <line x1="164" y1="140" x2="164" y2="160" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.2"/>
  <text x="164" y="168" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8" fill="#6366f1" opacity="0.2">&#x25BC;</text>

  <!-- Loop zone -->
  <rect x="24" y="172" width="280" height="310" rx="10" fill="rgba(99,102,241,0.02)" stroke="rgba(99,102,241,0.2)" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="164" y="192" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8" fill="#818cf8" letter-spacing="2">CONTINUOUS LOOP</text>

  <!-- Loop step 1: Read -->
  <circle cx="46" cy="218" r="10" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="46" y="222" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#818cf8">&#x2193;</text>
  <text x="66" y="215" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="10" font-weight="600" fill="#e2e8f0">Read a section</text>
  <text x="66" y="228" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8" fill="#6b7394">Pull design guidance</text>
  <rect x="66" y="233" width="120" height="13" rx="3" fill="rgba(99,102,241,0.08)"/>
  <text x="72" y="243" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="7" fill="#818cf8">read_section(name)</text>

  <!-- Separator -->
  <line x1="52" y1="256" x2="280" y2="256" stroke="#252b45" stroke-width="0.5" opacity="0.3"/>

  <!-- Loop step 2: Work -->
  <circle cx="46" cy="278" r="10" fill="transparent" stroke="rgba(99,102,241,0.2)" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="46" y="282" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#818cf8">&#x270E;</text>
  <text x="66" y="275" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="10" font-weight="600" fill="#e2e8f0">Do work</text>
  <text x="66" y="288" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8" fill="#6b7394">Build, decide, iterate</text>

  <!-- Separator -->
  <line x1="52" y1="302" x2="280" y2="302" stroke="#252b45" stroke-width="0.5" opacity="0.3"/>

  <!-- Loop step 3: Write -->
  <circle cx="46" cy="324" r="10" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="46" y="328" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#818cf8">&#x2191;</text>
  <text x="66" y="321" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="10" font-weight="600" fill="#e2e8f0">Write back</text>
  <text x="66" y="334" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8" fill="#6b7394">Capture decisions</text>
  <rect x="66" y="339" width="105" height="13" rx="3" fill="rgba(99,102,241,0.08)"/>
  <text x="72" y="349" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="7" fill="#818cf8">write_section(...)</text>

  <!-- Separator -->
  <line x1="52" y1="362" x2="280" y2="362" stroke="#252b45" stroke-width="0.5" opacity="0.3"/>

  <!-- Loop step 4: Check updates -->
  <circle cx="46" cy="384" r="10" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="46" y="388" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#818cf8">&#x2193;</text>
  <text x="66" y="381" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="10" font-weight="600" fill="#e2e8f0">Check for updates</text>
  <text x="66" y="394" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8" fill="#6b7394">New section from another agent?</text>
  <rect x="66" y="399" width="75" height="13" rx="3" fill="rgba(99,102,241,0.08)"/>
  <text x="72" y="409" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="7" fill="#818cf8">get_index()</text>

  <!-- Loop footer -->
  <line x1="44" y1="432" x2="284" y2="432" stroke="rgba(99,102,241,0.15)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="164" y="452" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8" fill="#4a5578">&#x21bb; repeat throughout session</text>

  <!-- ═══ COLUMN 2: EXAMPLE ═══ -->

  <!-- Example 1: Connect -->
  <rect x="330" y="78" width="260" height="78" rx="6" fill="#0f1220" stroke="#252b45" stroke-width="1"/>
  <rect x="330" y="78" width="260" height="18" rx="6" fill="#141827"/>
  <rect x="330" y="90" width="260" height="6" fill="#141827"/>
  <text x="342" y="91" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="7" fill="#818cf8" letter-spacing="1">STEP 1 — CONNECT</text>
  <line x1="330" y1="96" x2="590" y2="96" stroke="#252b45" stroke-width="0.5"/>
  <text x="342" y="112" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" font-weight="600" fill="#8b9ad0">## Shared Context</text>
  <text x="342" y="128" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8.5" fill="#a78bfa">### design-philosophy (v2)</text>
  <text x="342" y="141" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8.5" fill="#6b7394">Density over whitespace...</text>

  <!-- Example 2: Read -->
  <rect x="330" y="198" width="260" height="78" rx="6" fill="#0f1220" stroke="#252b45" stroke-width="1"/>
  <rect x="330" y="198" width="260" height="18" rx="6" fill="#141827"/>
  <rect x="330" y="210" width="260" height="6" fill="#141827"/>
  <text x="342" y="211" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="7" fill="#818cf8" letter-spacing="1">STEP 2 — READ</text>
  <line x1="330" y1="216" x2="590" y2="216" stroke="#252b45" stroke-width="0.5"/>
  <text x="342" y="232" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8.5" fill="#a78bfa">### design-philosophy (v2)</text>
  <text x="342" y="248" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8.5" fill="#b8c4e0">Optimize for scanning, not</text>
  <text x="342" y="261" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8.5" fill="#b8c4e0">browsing. 200+ positions.</text>

  <!-- Example 3: Write back -->
  <rect x="330" y="324" width="260" height="78" rx="6" fill="#0f1220" stroke="#252b45" stroke-width="1"/>
  <rect x="330" y="324" width="260" height="18" rx="6" fill="#141827"/>
  <rect x="330" y="336" width="260" height="6" fill="#141827"/>
  <text x="342" y="337" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="7" fill="#818cf8" letter-spacing="1">STEP 3 — WRITE BACK</text>
  <line x1="330" y1="342" x2="590" y2="342" stroke="#252b45" stroke-width="0.5"/>
  <text x="342" y="358" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8.5" fill="#a78bfa">### layout-decisions (v1)</text>
  <text x="342" y="374" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8.5" fill="#b8c4e0">Chose grid over cards — need</text>
  <text x="342" y="387" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8.5" fill="#6b7394">everything visible at once.</text>

  <!-- ═══ COLUMN 3: MEANWHILE ═══ -->

  <rect x="616" y="78" width="240" height="384" rx="8" fill="rgba(99,102,241,0.02)" stroke="rgba(99,102,241,0.15)" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- Meanwhile item 1 -->
  <text x="632" y="108" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="10" font-weight="700" fill="#e2e8f0">James</text>
  <text x="632" y="122" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#6b7394">Writes component-conventions</text>
  <text x="632" y="135" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#6b7394">after choosing patterns</text>
  <rect x="632" y="142" width="98" height="13" rx="3" fill="rgba(99,102,241,0.08)"/>
  <text x="638" y="152" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="7" fill="#818cf8">write_section(...)</text>

  <!-- Separator -->
  <line x1="632" y1="168" x2="840" y2="168" stroke="#252b45" stroke-width="0.5" opacity="0.15"/>

  <!-- Meanwhile item 2 -->
  <text x="632" y="192" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="10" font-weight="700" fill="#e2e8f0">Sarah</text>
  <text x="632" y="206" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#6b7394">Updates current-status with</text>
  <text x="632" y="219" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#6b7394">sprint progress</text>
  <rect x="632" y="226" width="98" height="13" rx="3" fill="rgba(99,102,241,0.08)"/>
  <text x="638" y="236" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="7" fill="#818cf8">write_section(...)</text>

  <!-- Separator -->
  <line x1="632" y1="252" x2="840" y2="252" stroke="#252b45" stroke-width="0.5" opacity="0.15"/>

  <!-- Meanwhile item 3 -->
  <text x="632" y="276" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="10" font-weight="700" fill="#e2e8f0">James</text>
  <text x="632" y="290" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#6b7394">Reads your layout-decisions,</text>
  <text x="632" y="303" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#6b7394">builds on them</text>
  <rect x="632" y="310" width="98" height="13" rx="3" fill="rgba(99,102,241,0.08)"/>
  <text x="638" y="320" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="7" fill="#818cf8">read_section()</text>

  <!-- Meanwhile footer -->
  <line x1="632" y1="346" x2="840" y2="346" stroke="rgba(99,102,241,0.15)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="632" y="366" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8" fill="#4a5578" font-style="italic">Their writes appear in your</text>
  <text x="632" y="379" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8" fill="#4a5578" font-style="italic">next read. Conflicts caught</text>
  <text x="632" y="392" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8" fill="#4a5578" font-style="italic">automatically.</text>
</svg>
