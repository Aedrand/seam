<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seam Header Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #0a0a0f;
    color: #e2e8f0;
    display: grid;
    grid-template-columns: 240px 1fr;
    grid-template-rows: 1fr auto;
    height: 100vh;
    overflow: hidden;
  }

  .controls {
    background: #0f1119; border-right: 1px solid #1e2438;
    padding: 14px; overflow-y: auto; grid-row: 1/3; font-size: 11px;
  }
  .controls h2 {
    font-size: 9px; text-transform: uppercase; letter-spacing: 2px;
    color: #6366f1; margin: 16px 0 6px; font-family: ui-monospace, monospace;
  }
  .controls h2:first-child { margin-top: 0; }
  .cg { margin-bottom: 8px; }
  .cg label { display: block; font-size: 10px; color: #94a3b8; margin-bottom: 2px; font-family: ui-monospace, monospace; }
  .cg input[type="text"], .cg select {
    width: 100%; background: #141827; border: 1px solid #252b45; color: #e2e8f0;
    padding: 4px 6px; border-radius: 3px; font-size: 10px; font-family: ui-monospace, monospace;
  }
  .cg input[type="range"] { width: 100%; accent-color: #6366f1; }
  .cg input[type="checkbox"] { accent-color: #6366f1; margin-right: 3px; }
  .cg input[type="color"] { width: 24px; height: 18px; border: 1px solid #252b45; background: none; cursor: pointer; border-radius: 2px; vertical-align: middle; margin-left: 4px; }
  .cg .rv { font-size: 9px; color: #475569; font-family: ui-monospace, monospace; float: right; }
  .presets { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
  .preset-btn {
    background: #141827; border: 1px solid #252b45; color: #94a3b8;
    padding: 3px 7px; border-radius: 3px; font-size: 9px; cursor: pointer;
    font-family: ui-monospace, monospace; transition: all 0.15s;
  }
  .preset-btn:hover { border-color: #6366f1; color: #c7d2fe; }
  .preset-btn.active { background: #6366f1; color: #fff; border-color: #6366f1; }

  .preview-area {
    display: flex; align-items: center; justify-content: center;
    padding: 20px; background: #111; overflow: auto;
  }

  .prompt-area {
    background: #0f1119; border-top: 1px solid #1e2438;
    padding: 8px 14px; display: flex; align-items: center; gap: 8px;
  }
  .prompt-text { flex: 1; font-family: ui-monospace, monospace; font-size: 10px; color: #64748b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn { border: none; padding: 4px 10px; border-radius: 3px; font-size: 10px; cursor: pointer; font-family: ui-monospace, monospace; }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155 !important; }

  /* ═══ HEADER PREVIEW ═══ */
  .hp {
    width: 880px; border-radius: 14px; font-family: 'SF Mono','Fira Code',ui-monospace,monospace;
    position: relative; overflow: hidden;
  }

  /* Title */
  .hp-title {
    text-align: center; padding: 22px 0 4px; font-size: 28px; font-weight: 800;
    letter-spacing: -0.5px;
  }
  .hp-subtitle {
    text-align: center; font-size: 11px; letter-spacing: 4px; opacity: 0.35;
    margin-bottom: 18px;
  }

  /* Main layout: person — arrows — server — arrows — person */
  .hp-flow {
    display: flex; align-items: center; justify-content: center;
    padding: 0 28px 0;
    gap: 0;
  }

  /* Person card */
  .hp-person {
    width: 155px; flex-shrink: 0; text-align: center;
  }
  .hp-person .hp-avatar {
    width: 48px; height: 48px; border-radius: 50%; margin: 0 auto 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700; text-transform: uppercase;
  }
  .hp-person .hp-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .hp-person .hp-loc { font-size: 9px; opacity: 0.4; margin-bottom: 6px; }
  .hp-person .hp-device {
    font-size: 8px; opacity: 0.3; border-radius: 4px; display: inline-block;
    padding: 2px 8px; border: 1px solid; margin-bottom: 6px;
  }
  .hp-person .hp-agent {
    font-size: 9px; border-radius: 5px; padding: 4px 10px;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .hp-person .hp-agent .dot { width: 5px; height: 5px; border-radius: 50%; background: #22c55e; }

  /* Arrow columns */
  .hp-arrows {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 6px; padding: 0 4px; min-width: 60px;
  }
  .hp-arrow-line {
    width: 100%; display: flex; align-items: center; gap: 0;
  }
  .hp-arrow-line .line {
    flex: 1; height: 0; border-top: 1.5px dashed; opacity: 0.35;
  }
  .hp-arrow-line .arrowhead {
    font-size: 10px; opacity: 0.35; line-height: 1;
  }
  .hp-arrows .arrow-label {
    font-size: 7px; letter-spacing: 1.5px; opacity: 0.25; text-align: center;
  }

  /* Server / center block */
  .hp-center {
    flex-shrink: 0; width: 280px; text-align: left;
  }
  .hp-server-box {
    border-radius: 10px; border: 1.5px solid; overflow: hidden;
  }
  .hp-server-head {
    padding: 7px 12px; display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 700;
  }
  .hp-server-head .sdot { width: 8px; height: 8px; border-radius: 50%; }
  .hp-server-divider { height: 1px; }

  /* Context inside the server */
  .hp-context {
    padding: 10px 14px; font-size: 8.5px; line-height: 1.7;
    max-height: 160px; overflow: hidden;
  }
  .hp-context .ctx-heading { font-weight: 600; }
  .hp-context .ctx-section { margin-top: 2px; }
  .hp-context .ctx-body { }
  .hp-context .ctx-author { font-style: italic; }
  .hp-context .ctx-spacer { height: 4px; }

  /* Footer */
  .hp-footer {
    margin: 14px 28px 0; padding: 10px 0 16px;
    font-size: 9px; display: flex; gap: 10px; align-items: center; opacity: 0.25;
  }
  .hp-footer .sep { width: 3px; height: 3px; border-radius: 50%; }
</style>
</head>
<body>

<div class="controls">
  <h2>Presets</h2>
  <div class="presets">
    <button class="preset-btn active" onclick="applyPreset('default',this)">Default</button>
    <button class="preset-btn" onclick="applyPreset('minimal',this)">Minimal</button>
    <button class="preset-btn" onclick="applyPreset('warm',this)">Warm</button>
    <button class="preset-btn" onclick="applyPreset('green',this)">Matrix</button>
    <button class="preset-btn" onclick="applyPreset('loud',this)">Bold</button>
  </div>

  <h2>Left Person</h2>
  <div class="cg"><label>Name</label><input type="text" id="nameL" value="Sarah" oninput="u()"></div>
  <div class="cg"><label>Location</label><input type="text" id="locL" value="San Francisco" oninput="u()"></div>
  <div class="cg"><label>Device</label><select id="devL" onchange="u()"><option value="laptop" selected>Laptop</option><option value="desktop">Desktop</option><option value="server">Server</option></select></div>

  <h2>Right Person</h2>
  <div class="cg"><label>Name</label><input type="text" id="nameR" value="Andrew" oninput="u()"></div>
  <div class="cg"><label>Location</label><input type="text" id="locR" value="New York" oninput="u()"></div>
  <div class="cg"><label>Device</label><select id="devR" onchange="u()"><option value="laptop">Laptop</option><option value="desktop" selected>Desktop</option><option value="server">Server</option></select></div>

  <h2>Server</h2>
  <div class="cg"><label>Label</label><input type="text" id="srvLabel" value="seam" oninput="u()"></div>
  <div class="cg"><label>Host</label><input type="text" id="srvHost" value="seam.up.railway.app" oninput="u()"></div>

  <h2>Arrows</h2>
  <div class="cg"><label>Label</label><select id="arrowLabel" onchange="u()">
    <option value="read-write" selected>reads / writes</option>
    <option value="mcp">HTTPS / MCP</option>
    <option value="none">None</option>
  </select></div>

  <h2>Content</h2>
  <div class="cg"><label><input type="checkbox" id="showTitle" checked onchange="u()"> Title "seam"</label></div>
  <div class="cg"><label><input type="checkbox" id="showSubtitle" checked onchange="u()"> Subtitle</label></div>
  <div class="cg"><label><input type="checkbox" id="showContext" checked onchange="u()"> Context inside server</label></div>
  <div class="cg"><label><input type="checkbox" id="showFooter" checked onchange="u()"> Footer</label></div>
  <div class="cg"><label><input type="checkbox" id="showAvatars" checked onchange="u()"> Avatars</label></div>
  <div class="cg"><label><input type="checkbox" id="showDevices" checked onchange="u()"> Device labels</label></div>

  <h2>Colors</h2>
  <div class="cg"><label>Accent <input type="color" id="accent" value="#6366f1" oninput="u()"></label></div>
  <div class="cg"><label>Background <input type="color" id="bg" value="#0c0e1a" oninput="u()"></label></div>
  <div class="cg"><label>Glow <span class="rv" id="gv">8</span>%</label><input type="range" id="glow" min="0" max="25" value="8" oninput="u()"></div>
  <div class="cg"><label>Person card bg opacity <span class="rv" id="pov">8</span>%</label><input type="range" id="personBgOp" min="0" max="30" value="8" oninput="u()"></div>
</div>

<div class="preview-area">
  <div id="preview"></div>
</div>

<div class="prompt-area">
  <div class="prompt-text" id="prompt"></div>
  <button class="btn btn-primary" onclick="copyPrompt()">Copy Prompt</button>
</div>

<script>
function $(id){return document.getElementById(id)}
function v(id){const e=$(id);return e.type==='checkbox'?e.checked:e.value}
function lighten(h,a){let[r,g,b]=[1,3,5].map(i=>parseInt(h.slice(i,i+2),16));[r,g,b]=[r,g,b].map(c=>Math.min(255,Math.floor(c+(255-c)*a)));return'#'+[r,g,b].map(c=>c.toString(16).padStart(2,'0')).join('')}
function darken(h,a){let[r,g,b]=[1,3,5].map(i=>parseInt(h.slice(i,i+2),16));[r,g,b]=[r,g,b].map(c=>Math.max(0,Math.floor(c*(1-a))));return'#'+[r,g,b].map(c=>c.toString(16).padStart(2,'0')).join('')}
function rgba(h,a){const[r,g,b]=[1,3,5].map(i=>parseInt(h.slice(i,i+2),16));return`rgba(${r},${g},${b},${a})`}

const PRESETS = {
  default: {nameL:'Sarah',locL:'San Francisco',devL:'laptop',nameR:'Andrew',locR:'New York',devR:'desktop',srvLabel:'seam',srvHost:'seam.up.railway.app',arrowLabel:'read-write',showTitle:true,showSubtitle:true,showContext:true,showFooter:true,showAvatars:true,showDevices:true,accent:'#6366f1',bg:'#0c0e1a',glow:8,personBgOp:8},
  minimal: {nameL:'Sarah',locL:'San Francisco',devL:'laptop',nameR:'Andrew',locR:'New York',devR:'desktop',srvLabel:'seam',srvHost:'seam.up.railway.app',arrowLabel:'none',showTitle:true,showSubtitle:true,showContext:true,showFooter:false,showAvatars:true,showDevices:false,accent:'#6366f1',bg:'#0c0e1a',glow:4,personBgOp:0},
  warm: {nameL:'Sarah',locL:'San Francisco',devL:'laptop',nameR:'Andrew',locR:'New York',devR:'desktop',srvLabel:'seam',srvHost:'seam.up.railway.app',arrowLabel:'read-write',showTitle:true,showSubtitle:true,showContext:true,showFooter:true,showAvatars:true,showDevices:true,accent:'#f59e0b',bg:'#0f0d08',glow:10,personBgOp:8},
  green: {nameL:'Sarah',locL:'San Francisco',devL:'laptop',nameR:'Andrew',locR:'New York',devR:'desktop',srvLabel:'seam',srvHost:'seam.up.railway.app',arrowLabel:'mcp',showTitle:true,showSubtitle:false,showContext:true,showFooter:false,showAvatars:false,showDevices:true,accent:'#22c55e',bg:'#040d04',glow:12,personBgOp:5},
  loud: {nameL:'Sarah',locL:'San Francisco',devL:'laptop',nameR:'Andrew',locR:'New York',devR:'desktop',srvLabel:'seam',srvHost:'seam.up.railway.app',arrowLabel:'read-write',showTitle:true,showSubtitle:true,showContext:true,showFooter:true,showAvatars:true,showDevices:true,accent:'#ef4444',bg:'#0a0808',glow:15,personBgOp:12},
};

function applyPreset(name,btn){
  const p=PRESETS[name];
  Object.keys(p).forEach(k=>{const e=$(k);if(e){if(e.type==='checkbox')e.checked=p[k];else e.value=p[k]}});
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  u();
}

function u(){
  $('gv').textContent=v('glow');
  $('pov').textContent=v('personBgOp');

  const ac=v('accent'), bg=v('bg'), gl=parseInt(v('glow')), pbg=parseInt(v('personBgOp'));
  const bgL=lighten(bg,.07), bgLL=lighten(bg,.12), brd=lighten(bg,.18);
  const dim=lighten(bg,.3), mid=lighten(bg,.45), bright=lighten(bg,.85);
  const acL=lighten(ac,.2);

  const devMap={laptop:'Laptop',desktop:'Desktop',server:'Server'};

  function personCard(name,loc,dev,side){
    const initial=name.charAt(0).toUpperCase();
    const avatar=v('showAvatars')?`<div class="hp-avatar" style="background:${rgba(ac,0.15)};color:${ac};border:1.5px solid ${rgba(ac,0.3)}">${initial}</div>`:'';
    const device=v('showDevices')?`<div class="hp-device" style="border-color:${brd}">${devMap[dev]}</div>`:'';
    const cardBg=pbg>0?rgba(lighten(bg,.1),pbg/100):'transparent';
    return `<div class="hp-person" style="color:${bright}">
      ${avatar}
      <div class="hp-name">${name}</div>
      <div class="hp-loc" style="color:${dim}">${loc}</div>
      ${device}
      <div class="hp-agent" style="background:${rgba(ac,0.08)};color:${mid};border:1px solid ${rgba(ac,0.15)}"><span class="dot"></span> Agent</div>
    </div>`;
  }

  function arrowCol(dir){
    const lbl=v('arrowLabel');
    const leftArr=dir==='right'?'':`<span class="arrowhead" style="color:${ac}">&larr;</span>`;
    const rightArr=dir==='left'?'':`<span class="arrowhead" style="color:${ac}">&rarr;</span>`;

    let labelTop='', labelBot='';
    if(lbl==='read-write'){
      labelTop=dir==='right'?'READS':'WRITES';
      labelBot=dir==='right'?'WRITES':'READS';
    } else if(lbl==='mcp'){
      labelTop='HTTPS';
      labelBot='MCP';
    }

    return `<div class="hp-arrows">
      ${labelTop?`<div class="arrow-label" style="color:${mid}">${labelTop}</div>`:''}
      <div class="hp-arrow-line">
        ${leftArr}<div class="line" style="border-color:${ac}"></div>${rightArr}
      </div>
      <div class="hp-arrow-line">
        ${dir==='right'?`<span class="arrowhead" style="color:${ac}">&larr;</span>`:`<span class="arrowhead" style="color:${ac}">&rarr;</span>`}
        <div class="line" style="border-color:${ac}"></div>
        ${dir==='right'?'':`<span class="arrowhead" style="color:${ac}">&larr;</span>`}
      </div>
      ${labelBot?`<div class="arrow-label" style="color:${mid}">${labelBot}</div>`:''}
    </div>`;
  }

  // Context inside server
  let ctxHTML='';
  if(v('showContext')){
    ctxHTML=`<div class="hp-context" style="background:${darken(bg,.15)};color:${mid}">
      <div class="ctx-heading" style="color:${acL}">## Shared Context</div>
      <div class="ctx-spacer"></div>
      <div class="ctx-section" style="color:${lighten(ac,.3)}">### design-philosophy <span style="color:${dim}">(v2)</span></div>
      <div class="ctx-body" style="color:${mid}">Dense dashboard for analysts.</div>
      <div class="ctx-author" style="color:${dim}">*${v('nameL').toLowerCase()}, 2026-03-21*</div>
      <div class="ctx-spacer"></div>
      <div class="ctx-section" style="color:${lighten(ac,.3)}">### current-status <span style="color:${dim}">(v5)</span></div>
      <div class="ctx-body" style="color:${mid}">Sprint 3 in progress.</div>
      <div class="ctx-author" style="color:${dim}">*${v('nameR').toLowerCase()}, 2026-03-21*</div>
    </div>`;
  } else {
    ctxHTML=`<div style="padding:12px 14px;color:${dim};font-size:9px;background:${bgL}">
      Express + SQLite<br>MCP Streamable HTTP<br>
      <span style="color:${darken(dim,.3)}">${v('srvHost')}</span>
    </div>`;
  }

  const glowShadow=`0 0 ${gl*5}px ${rgba(ac,gl/100*3)}, 0 0 ${gl*10}px ${rgba(ac,gl/100*1.5)}`;

  const title=v('showTitle')?`<div class="hp-title" style="color:${bright}">${v('srvLabel')}</div>`:'';
  const subtitle=v('showSubtitle')?`<div class="hp-subtitle" style="color:${mid}">SHARED CONTEXT FOR AI AGENTS</div>`:'';

  let footer='';
  if(v('showFooter')){
    footer=`<div class="hp-footer" style="border-top:1px solid ${brd};color:${dim}">
      <span>MIT Licensed</span><span class="sep" style="background:${brd}"></span>
      <span>TypeScript</span><span class="sep" style="background:${brd}"></span>
      <span>SQLite</span><span class="sep" style="background:${brd}"></span>
      <span>MCP Protocol</span>
    </div>`;
  }

  $('preview').innerHTML=`<div class="hp" style="background:${bg}">
    ${title}${subtitle}
    <div class="hp-flow">
      ${personCard(v('nameL'),v('locL'),v('devL'),'left')}
      ${arrowCol('right')}
      <div class="hp-center">
        <div class="hp-server-box" style="border-color:${ac};box-shadow:${glowShadow}">
          <div class="hp-server-head" style="background:${bgLL};color:${bright}">
            <span class="sdot" style="background:${ac}"></span>
            ${v('srvHost')}
          </div>
          <div class="hp-server-divider" style="background:${brd}"></div>
          ${ctxHTML}
        </div>
      </div>
      ${arrowCol('left')}
      ${personCard(v('nameR'),v('locR'),v('devR'),'right')}
    </div>
    ${footer}
  </div>`;

  // Prompt
  const parts=[`Header: "${v('nameL')}" in ${v('locL')} and "${v('nameR')}" in ${v('locR')} on opposite sides`];
  parts.push(`bidirectional arrows to central ${v('srvLabel')} server`);
  if(v('showContext'))parts.push('shared markdown context visible inside the server');
  if(ac!=='#6366f1')parts.push(`accent: ${ac}`);
  if(bg!=='#0c0e1a')parts.push(`bg: ${bg}`);
  $('prompt').textContent=parts.join(', ')+'.';
}

function copyPrompt(){
  navigator.clipboard.writeText($('prompt').textContent);
  const b=document.querySelector('.btn-primary');b.textContent='Copied!';
  setTimeout(()=>b.textContent='Copy Prompt',1500);
}

u();
</script>
</body>
</html>
