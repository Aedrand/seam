<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0"/>
      <stop offset="15%" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="85%" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dashed-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="150" y1="0" x2="150" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="450" y1="0" x2="450" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="750" y1="0" x2="750" y2="320"/>
  </g>

  <!-- Title and tagline -->
  <text x="680" y="68" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="42" font-weight="bold" fill="#f1f5f9" letter-spacing="-1">seam</text>
  <text x="680" y="95" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="13" fill="#64748b">shared context for AI agents</text>

  <!-- Machine 1 group -->
  <rect x="30" y="42" width="175" height="90" rx="6" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <text x="118" y="58" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="9" fill="#475569">sarah's laptop</text>
  <rect x="48" y="68" width="140" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="118" y="95" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="13" fill="#94a3b8">Agent A</text>

  <!-- Machine 2 group -->
  <rect x="30" y="148" width="175" height="90" rx="6" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <text x="118" y="164" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="9" fill="#475569">andrew's desktop</text>
  <rect x="48" y="174" width="140" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="118" y="201" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="13" fill="#94a3b8">Agent B</text>

  <!-- Machine 3 group -->
  <rect x="30" y="254" width="175" height="56" rx="6" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <text x="118" y="270" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="9" fill="#475569">CI server</text>
  <rect x="48" y="278" width="140" height="24" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" opacity="0.6"/>
  <text x="118" y="295" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="11" fill="#64748b">Agent C</text>

  <!-- Internet cloud -->
  <text x="310" y="165" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="9" fill="#475569" opacity="0.8">internet</text>

  <!-- Connection lines A -->
  <line x1="205" y1="90" x2="355" y2="155" stroke="#818cf8" stroke-width="1.2" opacity="0.35" stroke-dasharray="6 4"/>
  <text x="268" y="112" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="9" fill="#818cf8" opacity="0.5">MCP</text>

  <!-- Connection lines B -->
  <line x1="205" y1="196" x2="355" y2="165" stroke="#818cf8" stroke-width="1.2" opacity="0.35" stroke-dasharray="6 4"/>
  <text x="268" y="192" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="9" fill="#818cf8" opacity="0.5">MCP</text>

  <!-- Connection lines C -->
  <line x1="205" y1="288" x2="355" y2="175" stroke="#818cf8" stroke-width="1" opacity="0.2" stroke-dasharray="6 4"/>

  <!-- Convergence point -->
  <line x1="355" y1="155" x2="400" y2="155" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
  <line x1="355" y1="165" x2="400" y2="165" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
  <line x1="355" y1="175" x2="400" y2="175" stroke="#818cf8" stroke-width="1" opacity="0.3"/>

  <!-- Server node -->
  <rect x="400" y="130" width="170" height="80" rx="10" fill="#1e293b" stroke="url(#accent)" stroke-width="2"/>
  <circle cx="425" cy="155" r="5" fill="#818cf8" opacity="0.8"/>
  <text x="480" y="162" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="14" font-weight="bold" fill="#e2e8f0">Seam</text>
  <text x="480" y="188" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="10" fill="#64748b">SQLite + Express</text>

  <!-- What's inside - small index preview -->
  <rect x="608" y="128" width="260" height="86" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="620" y="145" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="9" fill="#818cf8">## Shared Context</text>
  <text x="620" y="160" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="9" fill="#64748b">### design-philosophy (v2)</text>
  <text x="620" y="173" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="8" fill="#475569">Dense dashboard for analysts...</text>
  <text x="620" y="186" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="9" fill="#64748b">### current-status (v5)</text>
  <text x="620" y="199" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="8" fill="#475569">Sprint 3 in progress...</text>
  <text x="620" y="210" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="8" fill="#334155" font-style="italic">*sarah, 2026-03-21*</text>

  <!-- Arrow from server to preview -->
  <line x1="570" y1="170" x2="605" y2="170" stroke="#334155" stroke-width="1"/>

  <!-- Decorative line -->
  <rect x="200" y="285" width="500" height="1.5" rx="1" fill="url(#line)"/>

  <!-- Bottom tags -->
  <text x="310" y="305" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="10" fill="#475569">lightweight</text>
  <text x="410" y="305" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="10" fill="#475569">readable</text>
  <text x="510" y="305" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="10" fill="#475569">peer-to-peer</text>
  <text x="600" y="305" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="10" fill="#475569">open</text>

  <!-- Dots between tags -->
  <circle cx="360" cy="303" r="1.5" fill="#334155"/>
  <circle cx="460" cy="303" r="1.5" fill="#334155"/>
  <circle cx="555" cy="303" r="1.5" fill="#334155"/>
</svg>
