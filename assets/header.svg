<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="880" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0e1a"/>
      <stop offset="100%" stop-color="#10132a"/>
    </linearGradient>
    <linearGradient id="server-glow" x1="290" y1="100" x2="590" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1e3a"/>
      <stop offset="100%" stop-color="#111525"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="880" height="340" rx="14" fill="url(#bg)"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="28" font-weight="800" fill="#e8eaf6">seam</text>
  <text x="440" y="58" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="10" fill="#8892b0" letter-spacing="4">SHARED CONTEXT FOR AI AGENTS</text>

  <!-- ═══ LEFT PERSON: Sarah ═══ -->
  <g>
    <!-- Avatar -->
    <circle cx="95" cy="145" r="24" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="1.5"/>
    <text x="95" y="152" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="20" font-weight="700" fill="#6366f1">S</text>

    <!-- Name -->
    <text x="95" y="188" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="15" font-weight="700" fill="#e2e8f0">Sarah</text>

    <!-- Location -->
    <text x="95" y="203" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#6b7394">San Francisco</text>

    <!-- Device -->
    <rect x="55" y="212" width="80" height="16" rx="4" fill="none" stroke="#3a4265" stroke-width="0.8"/>
    <text x="95" y="223" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8" fill="#4a5578">Laptop</text>

    <!-- Agent badge -->
    <rect x="50" y="236" width="90" height="22" rx="6" fill="rgba(99,102,241,0.06)" stroke="rgba(99,102,241,0.12)" stroke-width="1"/>
    <circle cx="66" cy="247" r="3" fill="#22c55e"/>
    <text x="78" y="251" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="10" fill="#8892b0">Agent</text>
  </g>

  <!-- ═══ LEFT ARROWS ═══ -->
  <g>
    <!-- Arrow right (writes) -->
    <line x1="160" y1="180" x2="280" y2="180" stroke="#6366f1" stroke-width="1.3" stroke-dasharray="6 4" opacity="0.3"/>
    <polygon points="280,177 287,180 280,183" fill="#6366f1" opacity="0.35"/>

    <!-- Arrow left (reads) -->
    <line x1="160" y1="200" x2="280" y2="200" stroke="#6366f1" stroke-width="1.3" stroke-dasharray="6 4" opacity="0.3"/>
    <polygon points="160,197 153,200 160,203" fill="#6366f1" opacity="0.35"/>

    <!-- Labels -->
    <text x="220" y="174" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="7" fill="#6b7394" letter-spacing="1.5">WRITES</text>
    <text x="220" y="216" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="7" fill="#6b7394" letter-spacing="1.5">READS</text>
  </g>

  <!-- ═══ CENTER: SEAM SERVER ═══ -->
  <g>
    <!-- Server box (single fill, no inner rects) -->
    <rect x="290" y="100" width="300" height="200" rx="10" fill="#151a30" stroke="#6366f1" stroke-width="1.5"/>

    <!-- Divider line -->
    <line x1="292" y1="128" x2="588" y2="128" stroke="#3a4265" stroke-width="0.5"/>

    <!-- Status dot + host -->
    <circle cx="308" cy="114" r="4" fill="#6366f1"/>
    <text x="320" y="118" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="11" fill="#b0b8d0">seam.up.railway.app</text>

    <!-- Context content -->
    <text x="306" y="150" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9.5" font-weight="600" fill="#818cf8">## Shared Context</text>
    <text x="306" y="164" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#6b7394">dashboard-redesign</text>

    <text x="306" y="184" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9.5" fill="#a78bfa">### design-philosophy</text>
    <text x="500" y="184" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#6b7394">(v2)</text>
    <text x="306" y="198" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8.5" fill="#8892b0">Dense dashboard for analysts.</text>
    <text x="306" y="212" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8" fill="#556180" font-style="italic">*sarah, 2026-03-21*</text>

    <text x="306" y="232" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9.5" fill="#a78bfa">### current-status</text>
    <text x="440" y="232" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#6b7394">(v5)</text>
    <text x="306" y="246" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8.5" fill="#8892b0">Sprint 3 in progress.</text>
    <text x="306" y="260" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8" fill="#556180" font-style="italic">*james, 2026-03-21*</text>

    <!-- Fade at bottom -->
    <rect x="291" y="272" width="298" height="27" rx="0" fill="url(#bg)" opacity="0.8"/>
  </g>

  <!-- ═══ RIGHT ARROWS ═══ -->
  <g>
    <!-- Arrow left (writes) -->
    <line x1="600" y1="180" x2="720" y2="180" stroke="#6366f1" stroke-width="1.3" stroke-dasharray="6 4" opacity="0.3"/>
    <polygon points="600,177 593,180 600,183" fill="#6366f1" opacity="0.35"/>

    <!-- Arrow right (reads) -->
    <line x1="600" y1="200" x2="720" y2="200" stroke="#6366f1" stroke-width="1.3" stroke-dasharray="6 4" opacity="0.3"/>
    <polygon points="720,197 727,200 720,203" fill="#6366f1" opacity="0.35"/>

    <!-- Labels -->
    <text x="660" y="174" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="7" fill="#6b7394" letter-spacing="1.5">WRITES</text>
    <text x="660" y="216" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="7" fill="#6b7394" letter-spacing="1.5">READS</text>
  </g>

  <!-- ═══ RIGHT PERSON: James ═══ -->
  <g>
    <!-- Avatar -->
    <circle cx="785" cy="145" r="24" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="1.5"/>
    <text x="785" y="152" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="20" font-weight="700" fill="#6366f1">J</text>

    <!-- Name -->
    <text x="785" y="188" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="15" font-weight="700" fill="#e2e8f0">James</text>

    <!-- Location -->
    <text x="785" y="203" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#6b7394">New York</text>

    <!-- Device -->
    <rect x="745" y="212" width="80" height="16" rx="4" fill="none" stroke="#3a4265" stroke-width="0.8"/>
    <text x="785" y="223" text-anchor="middle" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="8" fill="#4a5578">Desktop</text>

    <!-- Agent badge -->
    <rect x="740" y="236" width="90" height="22" rx="6" fill="rgba(99,102,241,0.06)" stroke="rgba(99,102,241,0.12)" stroke-width="1"/>
    <circle cx="756" cy="247" r="3" fill="#22c55e"/>
    <text x="768" y="251" font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="10" fill="#8892b0">Agent</text>
  </g>

  <!-- ═══ FOOTER ═══ -->
  <line x1="32" y1="310" x2="848" y2="310" stroke="#1e2438" stroke-width="0.5"/>
  <g font-family="'SF Mono','Fira Code',ui-monospace,monospace" font-size="9" fill="#4a5578">
    <text x="32" y="328">MIT Licensed</text>
    <circle cx="110" cy="325" r="1.2" fill="#1e2438"/>
    <text x="120" y="328">TypeScript</text>
    <circle cx="190" cy="325" r="1.2" fill="#1e2438"/>
    <text x="200" y="328">SQLite</text>
    <circle cx="244" cy="325" r="1.2" fill="#1e2438"/>
    <text x="254" y="328">MCP Protocol</text>
  </g>
</svg>
