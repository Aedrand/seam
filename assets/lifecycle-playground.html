<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seam Lifecycle Diagram Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #0a0a0f; color: #e2e8f0;
    display: grid; grid-template-columns: 220px 1fr; grid-template-rows: 1fr auto;
    height: 100vh; overflow: hidden;
  }
  .controls {
    background: #0f1119; border-right: 1px solid #1e2438;
    padding: 14px; overflow-y: auto; grid-row: 1/3; font-size: 11px;
  }
  .controls h2 { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: #6366f1; margin: 16px 0 6px; font-family: ui-monospace, monospace; }
  .controls h2:first-child { margin-top: 0; }
  .cg { margin-bottom: 8px; }
  .cg label { display: block; font-size: 10px; color: #94a3b8; margin-bottom: 2px; font-family: ui-monospace, monospace; }
  .cg select { width: 100%; background: #141827; border: 1px solid #252b45; color: #e2e8f0; padding: 4px 6px; border-radius: 3px; font-size: 10px; font-family: ui-monospace, monospace; }
  .cg input[type="checkbox"] { accent-color: #6366f1; margin-right: 3px; }
  .cg input[type="color"] { width: 24px; height: 18px; border: 1px solid #252b45; background: none; cursor: pointer; border-radius: 2px; vertical-align: middle; margin-left: 4px; }
  .presets { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
  .preset-btn { background: #141827; border: 1px solid #252b45; color: #94a3b8; padding: 3px 7px; border-radius: 3px; font-size: 9px; cursor: pointer; font-family: ui-monospace, monospace; }
  .preset-btn:hover { border-color: #6366f1; color: #c7d2fe; }
  .preset-btn.active { background: #6366f1; color: #fff; border-color: #6366f1; }
  .preview-area { display: flex; align-items: flex-start; justify-content: center; padding: 20px; background: #111; overflow: auto; }
  .prompt-area { background: #0f1119; border-top: 1px solid #1e2438; padding: 8px 14px; display: flex; align-items: center; gap: 8px; }
  .prompt-text { flex: 1; font-family: ui-monospace, monospace; font-size: 10px; color: #64748b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn { border: none; padding: 4px 10px; border-radius: 3px; font-size: 10px; cursor: pointer; font-family: ui-monospace, monospace; }
  .btn-primary { background: #6366f1; color: #fff; }

  /* ═══ DIAGRAM ═══ */
  .diagram { border-radius: 14px; padding: 24px 28px; font-family: 'SF Mono','Fira Code',ui-monospace,monospace; }
  .d-title { text-align: center; font-size: 11px; letter-spacing: 4px; margin-bottom: 16px; }

  /* Three column layout */
  .d-layout { display: grid; grid-template-columns: 320px 280px 240px; gap: 16px; align-items: start; }

  /* Column headers */
  .col-label { font-size: 9px; letter-spacing: 2px; text-align: center; margin-bottom: 10px; padding-top: 2px; }

  /* ── Left: Agent flow ── */
  .flow { display: flex; flex-direction: column; align-items: stretch; gap: 0; }
  .phase { border-radius: 8px; padding: 10px 14px; border: 1px solid; }
  .phase .ph-label { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
  .phase .ph-detail { font-size: 9px; line-height: 1.5; }
  .phase .ph-tool { font-size: 8px; padding: 2px 7px; border-radius: 3px; display: inline-block; margin-top: 4px; font-weight: 600; }

  .arrow-down { display: flex; flex-direction: column; align-items: center; padding: 2px 0; }
  .arrow-down .al { width: 0; height: 12px; border-left: 1.5px dashed; opacity: 0.2; }
  .arrow-down .ah { font-size: 8px; opacity: 0.2; line-height: 1; margin-top: -2px; }

  .loop-zone { border-radius: 10px; border: 1px dashed; padding: 12px 14px; }
  .loop-zone .lz-label { font-size: 8px; letter-spacing: 2px; text-align: center; margin-bottom: 8px; }
  .lz-step { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .lz-step:last-child { margin-bottom: 0; }
  .lz-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; }
  .lz-text { flex: 1; }
  .lz-action { font-size: 10px; font-weight: 600; }
  .lz-desc { font-size: 8px; line-height: 1.4; }
  .lz-tool { font-size: 7px; padding: 1px 5px; border-radius: 3px; display: inline-block; margin-top: 2px; }
  .lz-sep { height: 1px; margin: 6px 28px; opacity: 0.2; }
  .lz-footer { text-align: center; font-size: 8px; margin-top: 8px; padding-top: 8px; border-top: 1px dashed; }

  /* ── Middle: Example ── */
  .ex-flow { display: flex; flex-direction: column; gap: 0; }
  .ex-block { border-radius: 6px; border: 1px solid; overflow: hidden; }
  .ex-block .ex-step { font-size: 7px; letter-spacing: 1px; padding: 4px 10px; }
  .ex-block .ex-content { font-size: 8.5px; line-height: 1.6; padding: 6px 10px; }
  .ex-line { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ex-spacer { flex: 1; }

  /* ── Right: Meanwhile ── */
  .mw-col { border-radius: 8px; border: 1px dashed; padding: 14px; }
  .mw-item { margin-bottom: 12px; }
  .mw-item:last-child { margin-bottom: 0; }
  .mw-who { font-size: 10px; font-weight: 700; margin-bottom: 2px; }
  .mw-what { font-size: 9px; line-height: 1.5; }
  .mw-tool { font-size: 7px; padding: 1px 5px; border-radius: 3px; display: inline-block; margin-top: 3px; }
  .mw-sep { height: 1px; margin: 10px 0; opacity: 0.15; }
  .mw-footer { margin-top: 12px; padding-top: 10px; border-top: 1px dashed; font-size: 8px; font-style: italic; text-align: center; }
</style>
</head>
<body>

<div class="controls">
  <h2>Presets</h2>
  <div class="presets">
    <button class="preset-btn active" onclick="applyPreset('full',this)">Full</button>
    <button class="preset-btn" onclick="applyPreset('noex',this)">No Examples</button>
    <button class="preset-btn" onclick="applyPreset('nomw',this)">Solo Agent</button>
    <button class="preset-btn" onclick="applyPreset('warm',this)">Warm</button>
  </div>

  <h2>Scenario</h2>
  <div class="cg"><label>Use case</label><select id="scenario" onchange="u()">
    <option value="webapp" selected>Web app design</option>
    <option value="api">API development</option>
    <option value="onboarding">New team member</option>
  </select></div>

  <h2>Display</h2>
  <div class="cg"><label><input type="checkbox" id="showTools" checked onchange="u()"> Tool names</label></div>
  <div class="cg"><label><input type="checkbox" id="showExamples" checked onchange="u()"> Example column</label></div>
  <div class="cg"><label><input type="checkbox" id="showMeanwhile" checked onchange="u()"> Meanwhile column</label></div>
  <div class="cg"><label><input type="checkbox" id="showTitle" checked onchange="u()"> Title</label></div>
  <div class="cg"><label>Title position</label><select id="titlePos" onchange="u()">
    <option value="center">Center (full width)</option>
    <option value="left-col">Left column only</option>
    <option value="span-left-mid" selected>Span left + middle</option>
    <option value="left-align">Left aligned</option>
    <option value="above-example">Above example column</option>
  </select></div>

  <h2>Colors</h2>
  <div class="cg"><label>Accent <input type="color" id="accent" value="#6366f1" oninput="u()"></label></div>
  <div class="cg"><label>Background <input type="color" id="bg" value="#0c0e1a" oninput="u()"></label></div>
</div>

<div class="preview-area">
  <div id="preview"></div>
</div>

<div class="prompt-area">
  <div class="prompt-text" id="prompt"></div>
  <button class="btn btn-primary" onclick="copyPrompt()">Copy Prompt</button>
</div>

<script>
function $(id){return document.getElementById(id)}
function v(id){const e=$(id);return e.type==='checkbox'?e.checked:e.value}
function lighten(h,a){let[r,g,b]=[1,3,5].map(i=>parseInt(h.slice(i,i+2),16));[r,g,b]=[r,g,b].map(c=>Math.min(255,Math.floor(c+(255-c)*a)));return'#'+[r,g,b].map(c=>c.toString(16).padStart(2,'0')).join('')}
function rgba(h,a){const[r,g,b]=[1,3,5].map(i=>parseInt(h.slice(i,i+2),16));return`rgba(${r},${g},${b},${a})`}

const SCENARIOS = {
  webapp: {
    connect: { label:'Connect', detail:'Get index, read relevant sections', tool:'get_index() + read_section()' },
    loop: [
      { icon:'↓', action:'Read a section', desc:'Pull design guidance', tool:'read_section(name)' },
      { icon:'✎', action:'Do work', desc:'Build, decide, iterate', tool:'' },
      { icon:'↑', action:'Write back', desc:'Capture decisions', tool:'write_section(...)' },
      { icon:'↓', action:'Check for updates', desc:'See what others changed', tool:'get_index()' },
    ],
    example: [
      { step:'STEP 1 — CONNECT', lines:[
        {t:'## Shared Context',s:'heading'},{t:'',s:'sp'},
        {t:'### design-philosophy (v2)',s:'accent'},{t:'Density over whitespace...',s:'mid'},
        {t:'### data-display-patterns (v1)',s:'accent'},{t:'When to use tables vs cards...',s:'mid'},
      ]},
      { step:'STEP 2 — READ', lines:[
        {t:'### design-philosophy (v2)',s:'accent'},{t:'',s:'sp'},
        {t:'Optimize for scanning, not',s:'bright'},{t:'browsing. Analysts watch 200+',s:'bright'},
        {t:'positions simultaneously.',s:'mid'},
      ]},
      { step:'STEP 3 — WRITE BACK', lines:[
        {t:'### layout-decisions (v1)',s:'accent'},{t:'',s:'sp'},
        {t:'Chose grid over cards — need',s:'bright'},{t:'everything visible at once.',s:'bright'},
        {t:'Rejected tabs after user research.',s:'mid'},
      ]},
    ],
    meanwhile: [
      { who:'James', what:'Writes component-conventions after choosing patterns', tool:'write_section(...)' },
      { who:'Sarah', what:'Updates current-status with sprint progress', tool:'write_section(...)' },
      { who:'James', what:'Reads your layout-decisions, builds on them', tool:'read_section()' },
    ],
  },
  api: {
    connect: { label:'Connect', detail:'Get index, read API conventions', tool:'get_index() + read_section()' },
    loop: [
      { icon:'↓', action:'Read conventions', desc:'Check patterns first', tool:'read_section(name)' },
      { icon:'✎', action:'Build endpoint', desc:'Follow the patterns', tool:'' },
      { icon:'↑', action:'Document it', desc:'Write API decisions', tool:'write_section(...)' },
      { icon:'↓', action:'Check for updates', desc:'Conventions changed?', tool:'get_index()' },
    ],
    example: [
      { step:'STEP 1 — CONNECT', lines:[
        {t:'## Shared Context',s:'heading'},{t:'',s:'sp'},
        {t:'### api-conventions (v3)',s:'accent'},{t:'REST patterns, error handling...',s:'mid'},
        {t:'### auth-patterns (v1)',s:'accent'},{t:'Token strategy, middleware...',s:'mid'},
      ]},
      { step:'STEP 2 — READ', lines:[
        {t:'### api-conventions (v3)',s:'accent'},{t:'',s:'sp'},
        {t:'Consistent response envelope.',s:'bright'},{t:'Zod for validation at boundaries.',s:'bright'},
        {t:'Errors carry codes, not strings.',s:'mid'},
      ]},
      { step:'STEP 3 — WRITE BACK', lines:[
        {t:'### pagination-decision (v1)',s:'accent'},{t:'',s:'sp'},
        {t:'Chose cursor over offset —',s:'bright'},{t:'dataset grows unbounded.',s:'bright'},
      ]},
    ],
    meanwhile: [
      { who:'Sarah', what:'Updates api-conventions with new error codes', tool:'write_section(...)' },
      { who:'James', what:'Reads your pagination-decision', tool:'read_section()' },
    ],
  },
  onboarding: {
    connect: { label:'Connect', detail:'Discover what the team has captured', tool:'get_index() + read_section()' },
    loop: [
      { icon:'↓', action:'Read architecture', desc:'Understand before coding', tool:'read_section(name)' },
      { icon:'✎', action:'First contribution', desc:'Knows the patterns', tool:'' },
      { icon:'↑', action:'Document gaps', desc:'What was missing for you', tool:'write_section(...)' },
      { icon:'↓', action:'Stay current', desc:'Team keeps writing', tool:'get_index()' },
    ],
    example: [
      { step:'STEP 1 — CONNECT', lines:[
        {t:'## Shared Context',s:'heading'},{t:'',s:'sp'},
        {t:'### architecture (v4)',s:'accent'},{t:'Service boundaries, data flow...',s:'mid'},
        {t:'### deployment (v2)',s:'accent'},{t:'Environments, secrets, CI...',s:'mid'},
      ]},
      { step:'STEP 2 — READ', lines:[
        {t:'### architecture (v4)',s:'accent'},{t:'',s:'sp'},
        {t:'Background jobs go through Bull,',s:'bright'},{t:'never setTimeout. Redis-backed.',s:'bright'},
        {t:'Dashboard is a separate SPA.',s:'mid'},
      ]},
      { step:'STEP 3 — WRITE BACK', lines:[
        {t:'### environment-gotchas (v1)',s:'accent'},{t:'',s:'sp'},
        {t:'Staging requires REDIS_TLS=true.',s:'bright'},{t:'Not documented anywhere else.',s:'bright'},
      ]},
    ],
    meanwhile: [
      { who:'Sarah', what:'Updates architecture with new caching layer', tool:'write_section(...)' },
      { who:'James', what:'Reads your environment-gotchas', tool:'read_section()' },
    ],
  },
};

const PRESETS = {
  full:{showTools:true,showExamples:true,showMeanwhile:true,showTitle:true,titlePos:'span-left-mid',accent:'#6366f1',bg:'#0c0e1a',scenario:'webapp'},
  noex:{showTools:true,showExamples:false,showMeanwhile:true,showTitle:true,titlePos:'center',accent:'#6366f1',bg:'#0c0e1a',scenario:'webapp'},
  nomw:{showTools:true,showExamples:true,showMeanwhile:false,showTitle:true,titlePos:'center',accent:'#6366f1',bg:'#0c0e1a',scenario:'webapp'},
  warm:{showTools:true,showExamples:true,showMeanwhile:true,showTitle:true,titlePos:'span-left-mid',accent:'#f59e0b',bg:'#0f0d08',scenario:'webapp'},
};

function applyPreset(n,btn){
  const p=PRESETS[n];
  Object.keys(p).forEach(k=>{const e=$(k);if(e){if(e.type==='checkbox')e.checked=p[k];else e.value=p[k]}});
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  u();
}

function u(){
  const ac=v('accent'),bg=v('bg');
  const brd=lighten(bg,.18),dim=lighten(bg,.3),mid=lighten(bg,.45),bright=lighten(bg,.85);
  const acL=lighten(ac,.2),acLL=lighten(ac,.35);
  const sc=SCENARIOS[v('scenario')];
  const showEx=v('showExamples'),showMW=v('showMeanwhile');

  // Grid columns
  const cols = showEx && showMW ? '300px 260px 220px'
    : showEx ? '340px 320px'
    : showMW ? '400px 260px'
    : '500px';

  let html='';
  const tp = v('titlePos');
  if(v('showTitle')) {
    if (tp === 'center') {
      html+=`<div class="d-title" style="color:${mid};text-align:center">HOW IT WORKS</div>`;
    } else if (tp === 'left-col') {
      // Will be inserted inside the left column instead
    } else if (tp === 'span-left-mid') {
      // Title spans left + middle columns only, not the meanwhile
      html+=`<div class="d-title" style="color:${mid};text-align:center;max-width:${showEx?'580px':'340px'};margin-left:0;margin-right:auto">HOW IT WORKS</div>`;
    } else if (tp === 'left-align') {
      html+=`<div class="d-title" style="color:${mid};text-align:left">HOW IT WORKS</div>`;
    } else if (tp === 'above-example') {
      // Will be handled in example column
    }
  }

  html+=`<div class="d-layout" style="grid-template-columns:${cols}">`;

  // ═══ Column 1: Agent flow ═══
  html+='<div>';
  if(v('showTitle') && tp === 'left-col') {
    html+=`<div class="d-title" style="color:${mid};text-align:center;margin-bottom:4px">HOW IT WORKS</div>`;
  }
  html+=`<div class="col-label" style="color:${dim}">YOUR AGENT</div>`;
  html+='<div class="flow">';

  // Connect
  html+=`<div class="phase" style="border-color:${brd};background:${rgba(lighten(bg,.08),.8)}">
    <div class="ph-label" style="color:${bright}">${sc.connect.label}</div>
    <div class="ph-detail" style="color:${mid}">${sc.connect.detail}</div>
    ${v('showTools')?`<div class="ph-tool" style="background:${rgba(ac,.1)};color:${acL}">${sc.connect.tool}</div>`:''}
  </div>`;

  html+=`<div class="arrow-down"><div class="al" style="border-color:${ac}"></div><div class="ah" style="color:${ac}">▼</div></div>`;

  // Loop zone
  html+=`<div class="loop-zone" style="border-color:${rgba(ac,.2)};background:${rgba(ac,.02)}">`;
  html+=`<div class="lz-label" style="color:${acL}">CONTINUOUS LOOP</div>`;

  sc.loop.forEach((item,i)=>{
    if(i>0)html+=`<div class="lz-sep" style="background:${brd}"></div>`;
    const isWork=!item.tool;
    html+=`<div class="lz-step">
      <div class="lz-icon" style="background:${isWork?'transparent':rgba(ac,.1)};color:${acL};border:1px ${isWork?'dashed':'solid'} ${rgba(ac,.2)}">${item.icon}</div>
      <div class="lz-text">
        <div class="lz-action" style="color:${bright}">${item.action}</div>
        <div class="lz-desc" style="color:${mid}">${item.desc}</div>
        ${v('showTools')&&item.tool?`<div class="lz-tool" style="background:${rgba(ac,.08)};color:${acL}">${item.tool}</div>`:''}
      </div>
    </div>`;
  });

  html+=`<div class="lz-footer" style="color:${dim};border-color:${rgba(ac,.15)}">↻ repeat throughout session</div>`;
  html+='</div>';
  html+='</div></div>';

  // ═══ Column 2: Example ═══
  if(showEx){
    const colors={heading:acL,accent:acLL,bright:lighten(bg,.75),mid:mid,dim:dim};

    function exBlock(section,borderColor) {
      let h=`<div class="ex-block" style="border-color:${brd};background:${lighten(bg,.03)}">`;
      h+=`<div class="ex-step" style="color:${acL};background:${lighten(bg,.05)};border-bottom:1px solid ${brd}">${section.step}</div>`;
      h+=`<div class="ex-content">`;
      section.lines.forEach(l=>{
        if(l.s==='sp'){h+='<div style="height:2px"></div>';return;}
        const c=colors[l.s]||mid;
        const fw=l.s==='heading'?'font-weight:600;':'';
        h+=`<div class="ex-line" style="color:${c};${fw}">${l.t}</div>`;
      });
      h+='</div></div>';
      return h;
    }

    html+='<div>';
    if(v('showTitle') && tp === 'above-example') {
      html+=`<div class="d-title" style="color:${mid};text-align:center;margin-bottom:4px">HOW IT WORKS</div>`;
    }
    html+=`<div class="col-label" style="color:${dim}">EXAMPLE</div>`;
    html+='<div class="ex-flow">';

    // First example aligns with Connect phase
    html+=exBlock(sc.example[0]);

    // Spacer for the arrow between connect and loop
    html+='<div style="height:26px"></div>';

    // Second and third examples align with the loop zone
    html+=exBlock(sc.example[1]);
    html+='<div style="height:8px"></div>';
    html+=exBlock(sc.example[2]);

    html+='</div></div>';
  }

  // ═══ Column 3: Meanwhile ═══
  if(showMW){
    html+='<div>';
    html+=`<div class="col-label" style="color:${dim}">MEANWHILE</div>`;
    html+=`<div class="mw-col" style="border-color:${rgba(ac,.15)};background:${rgba(ac,.02)}">`;

    sc.meanwhile.forEach((m,i)=>{
      if(i>0)html+=`<div class="mw-sep" style="background:${brd}"></div>`;
      html+=`<div class="mw-item">
        <div class="mw-who" style="color:${bright}">${m.who}</div>
        <div class="mw-what" style="color:${mid}">${m.what}</div>
        ${v('showTools')?`<div class="mw-tool" style="background:${rgba(ac,.08)};color:${acL}">${m.tool}</div>`:''}
      </div>`;
    });

    html+=`<div class="mw-footer" style="color:${dim};border-color:${rgba(ac,.15)}">Their writes appear in your next read. Conflicts caught automatically.</div>`;
    html+='</div></div>';
  }

  html+='</div>';

  $('preview').innerHTML=`<div class="diagram" style="background:${bg}">${html}</div>`;

  const parts=[`Lifecycle: connect then continuous loop`];
  if(showEx)parts.push(`${v('scenario')} example column`);
  if(showMW)parts.push('"Meanwhile" column');
  $('prompt').textContent=parts.join(', ')+'.';
}

function copyPrompt(){
  navigator.clipboard.writeText($('prompt').textContent);
  const b=document.querySelector('.btn-primary');b.textContent='Copied!';
  setTimeout(()=>b.textContent='Copy Prompt',1500);
}

u();
</script>
</body>
</html>
